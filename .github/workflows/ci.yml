name: CI

# Offline checks only: no production secrets, no external API calls,
# no deploys. Manual integration tests (test_e2e.py) are never run here.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-checks:
    runs-on: ubuntu-latest
    env:
      # Dummy values so config.py's required-env validation passes.
      TELEGRAM_TOKEN: dummy-token
      ANTHROPIC_API_KEY: dummy-key
      ADMIN_ID: "1"
      DASHBOARD_TOKEN: dummy-dashboard-token
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python files
        run: python -m compileall .

      - name: Verify Procfile Python entrypoints exist
        run: |
          python - <<'PY'
          from pathlib import Path
          import shlex

          procfile = Path("Procfile")
          if not procfile.exists():
              raise SystemExit("Procfile is missing")

          for lineno, raw in enumerate(procfile.read_text().splitlines(), 1):
              raw = raw.strip()
              if not raw or raw.startswith("#") or ":" not in raw:
                  continue
              name, command = raw.split(":", 1)
              parts = shlex.split(command.strip())
              if len(parts) >= 2 and parts[0].startswith("python") and parts[1].endswith(".py"):
                  target = Path(parts[1])
                  if not target.exists():
                      raise SystemExit(f"Procfile line {lineno} references missing file: {target}")
          PY

      - name: Lint (ruff, gradual ruleset)
        run: ruff check .

      - name: Offline unit tests
        run: pytest tests/ -v
